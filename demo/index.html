<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>subrass - ASS Subtitle Renderer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #1a1a2e;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #16213e;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #e94560;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 14px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        @media (max-width: 1000px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .player-section {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .video-container {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        #video {
            width: 100%;
            height: 100%;
            display: block;
        }

        #subtitleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .controls button {
            padding: 10px 20px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .controls button:hover {
            background: #c73e54;
        }

        .controls button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .controls label {
            color: #a0a0a0;
            font-size: 13px;
        }

        .time-display {
            color: #e94560;
            font-family: monospace;
            font-size: 14px;
            min-width: 120px;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel {
            background: #16213e;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .panel h2 {
            color: #e94560;
            font-size: 16px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #0f3460;
        }

        .file-input {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .file-input label {
            display: inline-block;
            padding: 12px 20px;
            background: #0f3460;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            transition: background 0.3s;
        }

        .file-input label:hover {
            background: #1a4a7a;
        }

        .file-input input[type="file"] {
            display: none;
        }

        .file-name {
            padding: 8px 12px;
            background: #0a0a1a;
            border-radius: 4px;
            color: #a0a0a0;
            font-size: 12px;
            word-break: break-all;
        }

        .summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .summary-item {
            background: #0a0a1a;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }

        .summary-item .value {
            font-size: 18px;
            font-weight: bold;
            color: #e94560;
        }

        .summary-item .label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .event-list {
            max-height: 300px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .event-item {
            background: #0a0a1a;
            padding: 8px 10px;
            border-radius: 4px;
            border-left: 3px solid #e94560;
            font-size: 12px;
        }

        .event-item.comment {
            border-left-color: #555;
            opacity: 0.6;
        }

        .event-time {
            color: #666;
            font-size: 10px;
        }

        .event-text {
            color: #ccc;
            margin-top: 4px;
        }

        .placeholder {
            text-align: center;
            padding: 30px;
            color: #555;
            font-size: 13px;
        }

        .error {
            background: #e94560;
            color: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #e94560;
        }

        .font-upload {
            margin-top: 10px;
        }

        .font-upload label {
            display: inline-block;
            padding: 8px 15px;
            background: #0f3460;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .font-list {
            margin-top: 8px;
            font-size: 11px;
            color: #666;
        }

        .scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .scrollbar::-webkit-scrollbar-track {
            background: #0a0a1a;
            border-radius: 3px;
        }

        .scrollbar::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        .scrollbar::-webkit-scrollbar-thumb:hover {
            background: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>subrass</h1>
            <p class="subtitle">ASS/SSA Subtitle Renderer for WebAssembly</p>
        </header>

        <div class="main-content">
            <div class="player-section">
                <div class="video-container">
                    <video id="video" crossorigin="anonymous" playsinline></video>
                    <canvas id="subtitleCanvas"></canvas>
                </div>

                <div class="controls">
                    <button id="playPauseBtn" disabled>Play</button>
                    <button id="stopBtn" disabled>Stop</button>
                    <span class="time-display" id="timeDisplay">0:00:00.000</span>
                    <input type="range" id="seekBar" min="0" max="1000" value="0" disabled style="flex: 1;">
                    <label>
                        <input type="checkbox" id="loopCheck" checked> Loop
                    </label>
                </div>

                <div id="error" class="error" style="display: none;"></div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <h2>Load Files</h2>
                    <div class="file-input">
                        <label for="videoInput">Load Video</label>
                        <input type="file" id="videoInput" accept="video/*">
                        <span class="file-name" id="videoName">No video loaded</span>

                        <label for="assInput">Load ASS/SSA File</label>
                        <input type="file" id="assInput" accept=".ass,.ssa">
                        <span class="file-name" id="assName">No subtitle loaded</span>

                        <div class="font-upload">
                            <label for="fontInput">Load Font (optional)</label>
                            <input type="file" id="fontInput" accept=".ttf,.otf,.woff,.woff2" multiple>
                            <div class="font-list" id="fontList">Built-in: DejaVu Sans</div>
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <h2>Subtitle Info</h2>
                    <div class="summary" id="summary">
                        <div class="summary-item">
                            <div class="value" id="summaryRes">-</div>
                            <div class="label">Resolution</div>
                        </div>
                        <div class="summary-item">
                            <div class="value" id="summaryStyles">-</div>
                            <div class="label">Styles</div>
                        </div>
                        <div class="summary-item">
                            <div class="value" id="summaryEvents">-</div>
                            <div class="label">Events</div>
                        </div>
                        <div class="summary-item">
                            <div class="value" id="summaryTitle">-</div>
                            <div class="label">Title</div>
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <h2>Active Events</h2>
                    <div class="event-list scrollbar" id="eventList">
                        <div class="placeholder">Load video and subtitles to see events</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import init, { SubtitleRenderer, AssDoc } from '../pkg/subrass.js';

        let renderer = null;
        let video = null;
        let canvas = null;
        let animFrameId = null;
        let isPlaying = false;

        async function run() {
            await init();
            console.log('subrass loaded');

            video = document.getElementById('video');
            canvas = document.getElementById('subtitleCanvas');
            const ctx = canvas.getContext('2d');

            // File inputs
            document.getElementById('videoInput').addEventListener('change', handleVideoLoad);
            document.getElementById('assInput').addEventListener('change', handleAssLoad);
            document.getElementById('fontInput').addEventListener('change', handleFontLoad);

            // Controls
            document.getElementById('playPauseBtn').addEventListener('click', togglePlay);
            document.getElementById('stopBtn').addEventListener('click', stopVideo);
            document.getElementById('seekBar').addEventListener('input', seekVideo);

            // Video events
            video.addEventListener('loadedmetadata', onVideoMetadata);
            video.addEventListener('timeupdate', onTimeUpdate);
            video.addEventListener('ended', onVideoEnded);

            // Canvas resize
            window.addEventListener('resize', resizeCanvas);
        }

        function handleVideoLoad(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('videoName').textContent = file.name;
            const url = URL.createObjectURL(file);
            video.src = url;
            video.load();

            document.getElementById('playPauseBtn').disabled = false;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('seekBar').disabled = false;
        }

        async function handleAssLoad(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('assName').textContent = file.name;
            const content = await file.text();

            try {
                renderer = new SubtitleRenderer(content);
                // Set the canvas for rendering
                renderer.set_canvas(canvas);
                // Set video size if video is already loaded
                if (video.videoWidth) {
                    renderer.set_video_size(video.videoWidth, video.videoHeight);
                }
                updateSummary();
                console.log('Subtitle renderer created with canvas');
            } catch (err) {
                showError('Failed to load ASS file: ' + err.message);
                console.error(err);
            }
        }

        async function handleFontLoad(e) {
            const files = e.target.files;
            if (!files.length || !renderer) return;

            const fontList = document.getElementById('fontList');
            fontList.innerHTML = 'Built-in: DejaVu Sans<br>';

            for (const file of files) {
                try {
                    const buffer = await file.arrayBuffer();
                    const data = new Uint8Array(buffer);
                    renderer.load_font(file.name.replace(/\.[^.]+$/, ''), data);
                    fontList.innerHTML += file.name + '<br>';
                    console.log('Font loaded:', file.name);
                } catch (err) {
                    console.error('Failed to load font:', file.name, err);
                }
            }
        }

        function onVideoMetadata() {
            resizeCanvas();
            if (renderer) {
                renderer.set_video_size(video.videoWidth, video.videoHeight);
            }
        }

        function resizeCanvas() {
            if (!video.videoWidth) return;

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            if (renderer) {
                renderer.set_video_size(video.videoWidth, video.videoHeight);
                // Ensure canvas is set on renderer
                try {
                    renderer.set_canvas(canvas);
                } catch (e) {
                    // Canvas might already be set, ignore
                }
                // Render current frame
                renderFrame();
            }
        }

        function togglePlay() {
            if (video.paused) {
                video.play();
                isPlaying = true;
                document.getElementById('playPauseBtn').textContent = 'Pause';
                animate();
            } else {
                video.pause();
                isPlaying = false;
                document.getElementById('playPauseBtn').textContent = 'Play';
                if (animFrameId) {
                    cancelAnimationFrame(animFrameId);
                    animFrameId = null;
                }
            }
        }

        function stopVideo() {
            video.pause();
            video.currentTime = 0;
            isPlaying = false;
            document.getElementById('playPauseBtn').textContent = 'Play';
            if (animFrameId) {
                cancelAnimationFrame(animFrameId);
                animFrameId = null;
            }
            renderFrame();
        }

        function seekVideo() {
            const seekBar = document.getElementById('seekBar');
            const time = (seekBar.value / 1000) * video.duration;
            video.currentTime = time;
            renderFrame();
        }

        function onTimeUpdate() {
            const timeMs = video.currentTime * 1000;
            updateTimeDisplay(timeMs);

            // Update seek bar
            const seekBar = document.getElementById('seekBar');
            if (!seekBar.matches(':active')) {
                seekBar.value = (video.currentTime / video.duration) * 1000;
            }

            // Update active events list
            updateEventList(timeMs);
        }

        function onVideoEnded() {
            isPlaying = false;
            document.getElementById('playPauseBtn').textContent = 'Play';
            if (animFrameId) {
                cancelAnimationFrame(animFrameId);
                animFrameId = null;
            }

            if (document.getElementById('loopCheck').checked) {
                video.currentTime = 0;
                video.play();
                isPlaying = true;
                document.getElementById('playPauseBtn').textContent = 'Pause';
                animate();
            }
        }

        function animate() {
            if (!isPlaying) return;
            renderFrame();
            animFrameId = requestAnimationFrame(animate);
        }

        function renderFrame() {
            if (!renderer || !video.videoWidth) return;

            const timeMs = video.currentTime * 1000;

            try {
                // Resize canvas if needed
                if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    renderer.set_video_size(video.videoWidth, video.videoHeight);
                }

                // Ensure canvas context is set
                renderer.set_canvas(canvas);

                renderer.render_frame(timeMs);
            } catch (err) {
                console.error('Render error:', err);
            }
        }

        function updateTimeDisplay(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            const millis = Math.floor(ms % 1000);

            document.getElementById('timeDisplay').textContent =
                `${hours}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${String(millis).padStart(3, '0')}`;
        }

        function updateSummary() {
            if (!renderer) return;

            const res = renderer.get_play_resolution();
            document.getElementById('summaryRes').textContent = `${res[0]}x${res[1]}`;
            document.getElementById('summaryStyles').textContent = renderer.get_style_count();
            document.getElementById('summaryEvents').textContent = renderer.get_event_count();
        }

        function updateEventList(timeMs) {
            const eventList = document.getElementById('eventList');

            if (!renderer) {
                eventList.innerHTML = '<div class="placeholder">Load subtitles to see events</div>';
                return;
            }

            // Get events at current time from the AssDoc
            // We need to access the inner document
            // For now, just show a simple message
            eventList.innerHTML = `<div class="placeholder">Rendering at ${Math.floor(timeMs)}ms</div>`;
        }

        function showError(msg) {
            const error = document.getElementById('error');
            error.textContent = msg;
            error.style.display = 'block';
            setTimeout(() => {
                error.style.display = 'none';
            }, 5000);
        }

        run();
    </script>
</body>
</html>
